<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Another Me</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-frame jiro-landing">
      <section class="jiro-landing-hero">
        <canvas
          id="jiro-canvas"
          class="jiro-landing-canvas"
          width="720"
          height="720"
          aria-hidden="true"
        ></canvas>

        <nav class="jiro-landing-nav" aria-label="主要导航">
          <a href="./">ANOTHER ME</a>
          <a href="#features">孵化</a>
        </nav>

        <div class="jiro-landing-copy">
          <p class="jiro-landing-eyebrow">EMOTION COMPANION</p>
          <h1>Another Me</h1>
          <p>
            把刷到的情绪，养成一只会回应你的小猫。它会记住你的低落、
            兴奋和沉默，然后用刚刚好的方式靠近。
          </p>
          <div class="jiro-landing-actions">
            <a href="#features" class="jiro-primary-action">进入你的世界</a>
          </div>
        </div>
      </section>

      <section id="features" class="jiro-landing-strip" aria-label="产品亮点">
        <div>
          <span>01</span>
          <p>情绪打标</p>
        </div>
        <div>
          <span>02</span>
          <p>标签生宠</p>
        </div>
        <div>
          <span>03</span>
          <p>陪伴回复</p>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
